<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase Integration</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
    <h1>Nubia Firebase Test</h1>
    <div id="status">Initializing...</div>

    <div id="auth-section">
        <h2>Authentication Test</h2>
        <input type="email" id="email" placeholder="test@example.com" value="test@example.com">
        <input type="password" id="password" placeholder="password123" value="password123">
        <br><br>
        <button onclick="signUp()">Sign Up</button>
        <button onclick="signIn()">Sign In</button>
        <button onclick="signOut()">Sign Out</button>
        <div id="auth-status"></div>
    </div>

    <script>
        // Firebase configuration for aibun-ai project
        const firebaseConfig = {
            apiKey: "AIzaSyCWuOVIeEpK8XzSlk3hgVZho90kYH31P3c",
            authDomain: "aibun-ai.firebaseapp.com",
            projectId: "aibun-ai",
            storageBucket: "aibun-ai.firebasestorage.app",
            messagingSenderId: "966194603583",
            appId: "1:966194603583:web:07c4b19794ad441bc0fa8a"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        document.getElementById('status').innerHTML = 'Firebase initialized for project: ' + firebaseConfig.projectId;

        // Auth state listener
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-status').innerHTML =
                    `Logged in as: ${user.email} (UID: ${user.uid})`;
            } else {
                document.getElementById('auth-status').innerHTML = 'Not logged in';
            }
        });

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                console.log('User created:', userCredential.user);
            } catch (error) {
                alert('Sign up error: ' + error.message);
            }
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                console.log('User signed in:', userCredential.user);

                // Get ID token for API calls
                const idToken = await userCredential.user.getIdToken();
                console.log('ID Token:', idToken);

                // Test API call to backend
                testBackendAPI(idToken);
            } catch (error) {
                alert('Sign in error: ' + error.message);
            }
        }

        async function signOut() {
            try {
                await firebase.auth().signOut();
                console.log('User signed out');
            } catch (error) {
                alert('Sign out error: ' + error.message);
            }
        }

        async function testBackendAPI(idToken) {
            try {
                const response = await fetch('http://localhost:3001/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${idToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                console.log('Backend API response:', data);
            } catch (error) {
                console.error('Backend API error:', error);
            }
        }
    </script>
</body>
</html>
