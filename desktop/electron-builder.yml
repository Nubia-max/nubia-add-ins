appId: com.nubia.excel-automation
productName: Nubia
copyright: Copyright © 2024 Nubia Team
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: dist
  cache: .cache

files:
  - build/**/*
  - node_modules/**/*
  - public/electron.js
  - assets/**/*

extraResources:
  - from: assets/
    to: assets/
    filter:
      - "**/*"

# Auto-updater configuration
publish:
  - provider: generic
    url: https://updates.nubia.ai/releases/
    channel: latest

# macOS Configuration
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip  
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  darkModeSupport: true
  minimumSystemVersion: "10.14.0"

dmg:
  title: ${productName} ${version}
  icon: assets/icon.icns
  iconSize: 100
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
  window:
    width: 540
    height: 380
  backgroundColor: "#1a1a1a"
  artifactName: ${productName}-${version}-mac-installer.${ext}

# Windows Configuration
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64, ia32]
    - target: portable
      arch: [x64]
  publisherName: Nubia Team
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: asInvoker
  artifactName: ${productName}-${version}-win-${arch}.${ext}
  
  # File associations for Excel files
  fileAssociations:
    - ext: xlsx
      name: Excel Workbook
      description: Excel Workbook that can be automated with Nubia
      role: Editor
      icon: assets/excel-file.ico
    - ext: xls
      name: Excel 97-2003 Workbook
      description: Legacy Excel Workbook
      role: Editor
      icon: assets/excel-file.ico
    - ext: csv
      name: CSV File
      description: Comma Separated Values file
      role: Editor

# NSIS Installer Configuration (Windows)
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: true
  shortcutName: Nubia - Excel Automation
  uninstallDisplayName: ${productName}
  artifactName: ${productName}-${version}-setup.${ext}
  deleteAppDataOnUninstall: true
  
  # Custom installer script
  include: build/installer.nsh
  
  # License agreement
  license: LICENSE
  
  # Installer sidebar image
  installerSidebar: assets/installer-sidebar.bmp
  uninstallerSidebar: assets/installer-sidebar.bmp
  
  # Installer header
  installerHeader: assets/installer-header.bmp
  uninstallerHeader: assets/installer-header.bmp

portable:
  artifactName: ${productName}-${version}-portable.exe

# Linux Configuration  
linux:
  icon: assets/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
    - target: snap
      arch: [x64]
  category: Office
  maintainer: Nubia Team <support@nubia.ai>
  vendor: Nubia Team
  desktop:
    StartupWMClass: Nubia
    MimeType: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;application/vnd.ms-excel;text/csv
    Keywords: Excel;Automation;AI;Spreadsheet;Office
    StartupNotify: true
    Categories: Office;Spreadsheet;

# AppImage Configuration
appImage:
  license: LICENSE
  category: Office
  artifactName: ${productName}-${version}-linux-x64.${ext}

# Debian Package Configuration
deb:
  priority: optional
  maintainer: Nubia Team <support@nubia.ai>
  vendor: Nubia Team
  synopsis: AI-Powered Excel Automation Assistant
  description: |
    Nubia is an AI-powered Excel automation assistant that helps you automate
    repetitive Excel tasks through natural language commands. It supports both
    visual automation (screen-based) and background automation (file-based).
    
    Features:
    - Natural language Excel automation
    - Visual and background automation modes
    - Real-time progress tracking
    - Excel file management
    - Demo mode for testing
    - Comprehensive error handling
  
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3
    - libxrandr2
    - libasound2
    - libpangocairo-1.0-0
    - libatk1.0-0
    - libcairo-gobject2
    - libgtk-3-0
    - libgdk-pixbuf2.0-0
  
  recommends:
    - libreoffice-calc
    - python3
    - python3-pip
  
  artifactName: ${productName}-${version}-linux-amd64.${ext}

# RPM Package Configuration  
rpm:
  vendor: Nubia Team
  license: Commercial
  group: Applications/Office
  summary: AI-Powered Excel Automation Assistant
  description: |
    Nubia is an AI-powered Excel automation assistant that helps you automate
    repetitive Excel tasks through natural language commands.
  
  requires:
    - libnotify
    - libappindicator
    - libXtst
    - nss
    - libXrandr
    - alsa-lib
    - pango
    - atk
    - cairo
    - gtk3
    - gdk-pixbuf2
  
  artifactName: ${productName}-${version}-linux-x64.${ext}

# Snap Package Configuration
snap:
  summary: AI-Powered Excel Automation Assistant
  description: |
    Nubia is an AI-powered Excel automation assistant that helps you automate
    repetitive Excel tasks through natural language commands. It supports both
    visual automation (screen-based) and background automation (file-based).
  
  grade: stable
  confinement: strict
  
  plugs:
    - desktop
    - desktop-legacy
    - home
    - x11
    - unity7
    - browser-support
    - network
    - gsettings
    - audio-playback
    - pulseaudio
    - opengl
  
  environment:
    DISABLE_WAYLAND: 1