# Development Docker Compose configuration
version: '3.8'

services:
  # PostgreSQL Database (same as production)
  postgres:
    image: postgres:15-alpine
    container_name: nubia-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nubia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nubia_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - nubia-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nubia} -d ${POSTGRES_DB:-nubia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching (development)
  redis:
    image: redis:7-alpine
    container_name: nubia-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - nubia-dev-network
    command: redis-server --appendonly yes

  # Development database admin (optional)
  pgadmin:
    image: dpage/pgadmin4
    container_name: nubia-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nubia.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - nubia-dev-network
    profiles:
      - tools

  # Redis admin (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nubia-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - nubia-dev-network
    profiles:
      - tools

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  nubia-dev-network:
    driver: bridge