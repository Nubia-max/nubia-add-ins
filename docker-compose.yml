version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nubia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nubia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nubia_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nubia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nubia} -d ${POSTGRES_DB:-nubia_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nubia-backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-nubia}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-nubia_db}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - BACKEND_PORT=${BACKEND_PORT:-3001}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nubia-network
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python Automation Service
  automation:
    build:
      context: ./automation
      dockerfile: Dockerfile
    container_name: nubia-automation
    environment:
      - PYTHONPATH=/app
      - AUTOMATION_PORT=${AUTOMATION_PORT:-8000}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${AUTOMATION_PORT:-8000}:8000"
    networks:
      - nubia-network
    volumes:
      - ./automation/logs:/app/logs
      - ./automation/output:/app/output
      - /tmp/.X11-unix:/tmp/.X11-unix:rw  # For GUI automation (Linux)
    environment:
      - DISPLAY=${DISPLAY:-:0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (optional, for caching and session management)
  redis:
    image: redis:7-alpine
    container_name: nubia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nubia-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx (optional, for production deployment)
  nginx:
    image: nginx:alpine
    container_name: nubia-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - automation
    networks:
      - nubia-network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nubia-network:
    driver: bridge